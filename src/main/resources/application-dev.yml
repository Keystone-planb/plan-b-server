spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: none    # 테이블 생성 완료 후 none으로 전환 — 기동 시 스키마 비교 생략 (40~50초 단축)
                        # 새 @Entity 추가 시 배포 전 임시로 update로 변경 후 배포, 이후 none으로 복구

  data:
    redis:
      # t4g.micro 단일 노드 (Standalone 모드,전송 중 암호화 활성화)
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:true}
