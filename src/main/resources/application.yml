spring:
  # 기본 프로필: local (로컬 개발)
  # AWS ECS 배포 시 환경변수 SPRING_PROFILES_ACTIVE=prod 로 오버라이드
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  application:
    name: planb_backend

  datasource:
    # prepareThreshold=0: PgBouncer transaction 모드 호환 — 서버사이드 Prepared Statement 비활성화
    # driver-class-name 방식은 DriverManager 기반이므로 data-source-properties가 무시됨 →URL에 직접 파라미터 추가
    url: ${SPRING_DATASOURCE_URL}&prepareThreshold=0
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # 수파베이스 Nano 티어(제한 15개) 및 인스턴스 확장을 고려하여 3~5 사이 유지
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Transaction 모드에서 연결 유효성 검사를 위해 추가 권장
      connection-test-query: SELECT 1

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false} # AWS TLS 암호화 연결 대응

  jpa:
    hibernate:
      ddl-auto: none              # update → none: 스키마 검사용 isolated connection 요청 제거
    show-sql: false               # 운영 환경 SQL 로그 비활성화 (성능 개선)
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        temp:
          use_jdbc_metadata_defaults: false   # 시작 시 DB 메타데이터 조회용 isolated connection 요청 차단
        jdbc:
          lob:
            non_contextual_creation: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            scope: profile_nickname
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000      # 1시간 (ms)
  refresh-token-expiration: 1209600000  # 14일 (ms)

oauth2:
  success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:8082/oauth/success}
  failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:8082/oauth/failure}

naver:
  client:
    id: ${NAVER_CLIENT_ID:}
    secret: ${NAVER_CLIENT_SECRET:}

rapidapi:
  key: ${RAPIDAPI_KEY:}

#외부 API 키
openai:
  api-key: ${OPENAI_API_KEY:}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY}

weather:
  api-key: ${WEATHER_API_KEY:}

logging:
  level:
    # Spring Security 필터 체인 흐름 (어느 필터에서 막히는지 확인)
    org.springframework.security: DEBUG
    # 우리가 만든 JWT 필터 로그
    com.planb.planb_backend.jwt: DEBUG
    # MVC 요청 매핑 결과 (URL이 어느 컨트롤러에 매핑됐는지 확인)
    org.springframework.web.servlet.DispatcherServlet: DEBUG

#ECS 헬스체크 설정
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false # Redis 연결 지연으로 인한 ALB 배포 실패 방지
