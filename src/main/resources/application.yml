spring:
  # 기본 프로필: local (로컬 개발)
  # AWS ECS 배포 시 환경변수 SPRING_PROFILES_ACTIVE=prod 로 오버라이드
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  application:
    name: planb_backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false} # AWS TLS 암호화 연결 대응

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            scope: profile_nickname, account_email
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000      # 1시간 (ms)
  refresh-token-expiration: 1209600000  # 14일 (ms)

#외부 API 키
openai:
  api-key: ${OPENAI_API_KEY}

google:
  places-api-key: ${GOOGLE_PLACES_API_KEY}

logging:
  level:
    # Spring Security 필터 체인 흐름 (어느 필터에서 막히는지 확인)
    org.springframework.security: DEBUG
    # 우리가 만든 JWT 필터 로그
    com.planb.planb_backend.jwt: DEBUG
    # MVC 요청 매핑 결과 (URL이 어느 컨트롤러에 매핑됐는지 확인)
    org.springframework.web.servlet.DispatcherServlet: DEBUG

#ECS 헬스체크 설정
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false # Redis 연결 지연으로 인한 ALB 배포 실패 방지
