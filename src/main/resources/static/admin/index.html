<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan B Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
    .badge-complete  { @apply bg-green-100 text-green-800 text-xs font-semibold px-2 py-0.5 rounded-full; }
    .badge-pending   { @apply bg-yellow-100 text-yellow-800 text-xs font-semibold px-2 py-0.5 rounded-full; }
    .badge-progress  { @apply bg-blue-100 text-blue-800 text-xs font-semibold px-2 py-0.5 rounded-full; }
    .btn-primary     { @apply bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition; }
    .btn-sm          { @apply bg-amber-500 hover:bg-amber-600 text-white text-xs font-medium px-3 py-1 rounded transition; }
    .btn-sm:disabled { @apply opacity-50 cursor-not-allowed; }
    .input-base      { @apply border border-gray-300 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-indigo-400; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

<!-- ═══════════════════ 로그인 화면 ═══════════════════ -->
<div id="login-section" class="flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-3xl font-bold text-indigo-600">Plan B</div>
      <div class="text-gray-500 text-sm mt-1">관리자 페이지</div>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
        <input id="input-email" type="email" class="input-base" placeholder="admin@example.com" required />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input id="input-password" type="password" class="input-base" placeholder="••••••••" required />
      </div>
      <div id="login-error" class="text-red-500 text-sm hidden"></div>
      <button type="submit" id="login-btn" class="btn-primary w-full">로그인</button>
    </form>
  </div>
</div>

<!-- ═══════════════════ 어드민 메인 화면 ═══════════════════ -->
<div id="admin-section" class="hidden">

  <!-- 상단 네비게이션 -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-screen-xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-xl font-bold text-indigo-600">Plan B</span>
        <span class="text-gray-400">|</span>
        <span class="text-gray-700 font-medium">Admin Dashboard</span>
      </div>
      <div class="flex items-center gap-4">
        <span id="admin-nickname" class="text-sm text-gray-500"></span>
        <button onclick="handleLogout()" class="text-sm text-gray-500 hover:text-red-500 transition">로그아웃</button>
      </div>
    </div>
  </header>

  <!-- 본문 -->
  <main class="max-w-screen-xl mx-auto px-6 py-8">

    <!-- 통계 카드 -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="text-sm text-gray-500 mb-1">전체 장소</div>
        <div id="stat-total" class="text-3xl font-bold text-gray-800">—</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="text-sm text-gray-500 mb-1">분석 완료</div>
        <div id="stat-complete" class="text-3xl font-bold text-green-600">—</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="text-sm text-gray-500 mb-1">분석 미완료</div>
        <div id="stat-pending" class="text-3xl font-bold text-yellow-500">—</div>
      </div>
    </div>

    <!-- 검색 + 필터 + 새로고침 -->
    <div class="flex items-center gap-3 mb-4">
      <input id="search-input" type="text" class="input-base max-w-xs"
             placeholder="장소명 검색..."
             oninput="applyFilter()" />

      <select id="filter-status" class="input-base max-w-[160px]" onchange="applyFilter()">
        <option value="">전체 상태</option>
        <option value="COMPLETE">분석 완료</option>
        <option value="PENDING">분석 미완료</option>
      </select>

      <select id="filter-type" class="input-base max-w-[160px]" onchange="applyFilter()">
        <option value="">전체 타입</option>
        <option>FOOD</option>
        <option>CAFE</option>
        <option>SIGHTS</option>
        <option>SHOP</option>
        <option>MARKET</option>
        <option>THEME</option>
        <option>CULTURE</option>
        <option>PARK</option>
      </select>

      <button onclick="loadPlaces()" class="btn-primary whitespace-nowrap">새로고침</button>
    </div>

    <!-- 장소 테이블 -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div id="table-loading" class="py-16 text-center text-gray-400">불러오는 중...</div>

      <table id="places-table" class="w-full text-sm hidden">
        <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
          <tr>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">장소명</th>
            <th class="px-4 py-3 text-left">주소</th>
            <th class="px-4 py-3 text-left">타입</th>
            <th class="px-4 py-3 text-left">스페이스</th>
            <th class="px-4 py-3 text-left">분위기</th>
            <th class="px-4 py-3 text-left">평점</th>
            <th class="px-4 py-3 text-left">마지막 분석</th>
            <th class="px-4 py-3 text-left">상태</th>
            <th class="px-4 py-3 text-left">액션</th>
          </tr>
        </thead>
        <tbody id="places-tbody" class="divide-y divide-gray-100"></tbody>
      </table>

      <div id="no-results" class="py-16 text-center text-gray-400 hidden">검색 결과가 없습니다.</div>
    </div>

    <!-- 결과 수 -->
    <div id="result-count" class="mt-3 text-sm text-gray-400 text-right"></div>
  </main>
</div>

<script src="/admin/app.js"></script>
</body>
</html>
