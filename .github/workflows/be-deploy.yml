name: BE Deploy

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 소스코드 내려받기
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Java 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. JAR 빌드 (테스트 제외 — 테스트는 별도 단계에서)
      - name: Build JAR
        run: ./gradlew build -x test --no-daemon

      # ── 5. AWS 자격증명 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # ── 6. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 7. Docker 이미지 빌드 & ECR Push
      - name: Build and Push Docker Image
        run: |
          IMAGE_URI=${{ secrets.ECR_REPOSITORY_URI }}
          COMMIT_SHA=${{ github.sha }}

          docker build -t $IMAGE_URI:$COMMIT_SHA .
          docker push $IMAGE_URI:$COMMIT_SHA

          docker tag $IMAGE_URI:$COMMIT_SHA $IMAGE_URI:latest
          docker push $IMAGE_URI:latest

          echo "IMAGE_URI=$IMAGE_URI:$COMMIT_SHA" >> $GITHUB_ENV

      # ── 8. 현재 ECS 태스크 정의 가져오기
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition planb-task \
            --query taskDefinition \
            > task-definition.json

      # ── 9. 새 이미지로 태스크 정의 업데이트
      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: planb-backend
          image: ${{ env.IMAGE_URI }}

      # ── 10. ECS 롤링 배포
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: planb-service
          cluster: planb-cluster
          wait-for-service-stability: true
