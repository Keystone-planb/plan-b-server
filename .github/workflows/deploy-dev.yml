name: BE Deploy (Dev)

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 배포 시작 알림 ──
      - name: Discord 알림 (시작)
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🚀 배포 시작",
              "description": "PlanB 백엔드 **[개발 서버(Dev)]** 배포를 시작합니다.",
              "color": 3447003,
              "fields": [
                {"name": "브랜치", "value": "`dev`", "inline": true},
                {"name": "배포자", "value": "`${{ github.actor }}`", "inline": true},
                {"name": "로그 확인", "value": "[GitHub Actions 링크](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      # ── 1. 소스코드 내려받기
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Java 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. JAR 빌드 (테스트 제외)
      - name: Build JAR
        run: ./gradlew build -x test --no-daemon

      # ── 5. AWS 자격증명 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # ── 6. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 7. Docker 이미지 빌드 & ECR Push
      # dev-latest 태그 사용: prod의 latest 태그 덮어쓰기 방지 (동일 ECR 레포 공유 시)
      - name: Build and Push Docker Image
        run: |
          IMAGE_URI=${{ secrets.ECR_REPOSITORY_URI }}
          COMMIT_SHA=${{ github.sha }}

          docker build -t $IMAGE_URI:$COMMIT_SHA .
          docker push $IMAGE_URI:$COMMIT_SHA

          docker tag $IMAGE_URI:$COMMIT_SHA $IMAGE_URI:dev-latest
          docker push $IMAGE_URI:dev-latest

          echo "IMAGE_URI=$IMAGE_URI:$COMMIT_SHA" >> $GITHUB_ENV

      # ── 8. 현재 Dev ECS 태스크 정의 다운로드
      # AWS에서 실행 중인 최신 Task Definition을 직접 가져옴
      # → 수동 주입된 환경변수(SPRING_DATA_REDIS_SSL_ENABLED 등) 절대 유실 없음
      - name: Download current Dev task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition planb-dev-task \
            --query taskDefinition \
            | jq 'del(.enableFaultInjection)' \
            > task-definition.json

      # ── 9. 새 이미지로 태스크 정의 업데이트
      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: planb-backend
          image: ${{ env.IMAGE_URI }}

      # ── 10. ECS 롤링 배포 (Dev 서비스)
      - name: Deploy to ECS (Dev)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: planb-dev-task-service-sceckwba
          cluster: planb-cluster
          wait-for-service-stability: true

      # ── 11. 디스코드 알림 — 성공
      - name: Discord 알림 (성공)
        if: success()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          curl -X POST -H "Content-Type: application/json" \
          "${{ secrets.DISCORD_WEBHOOK_URL }}" \
          -d @- <<EOF
          {
            "embeds": [{
              "title": "✅ 배포 성공",
              "description": "**[개발 서버(Dev)]** 배포가 완료되었습니다.",
              "color": 5763719,
              "fields": [
                {"name": "브랜치", "value": "`dev`", "inline": true},
                {"name": "커밋 ID", "value": "$SHORT_SHA", "inline": true},
                {"name": "커밋 메시지", "value": "${COMMIT_MSG//\"/\\\"}", "inline": false},
                {"name": "타겟 서버", "value": "https://api-dev.planb-travel.cloud", "inline": false},
                {"name": "로그 확인", "value": "[GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
              ]
            }]
          }
          EOF

      # ── 12. 디스코드 알림 — 실패
      - name: Discord 알림 (실패)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "❌ 배포 실패",
              "description": "PlanB 백엔드 **[개발 서버(Dev)]** 배포 중 오류가 발생했습니다. GitHub Actions 로그를 확인해주세요.",
              "color": 15548997,
              "fields": [
                {"name": "브랜치", "value": "`dev`", "inline": true},
                {"name": "배포자", "value": "`${{ github.actor }}`", "inline": true},
                {"name": "로그 확인", "value": "[GitHub Actions 탭 바로가기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
